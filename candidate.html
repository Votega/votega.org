---
layout: default
title: Candidate Profile
permalink: /candidate.html
---

<div id="candidateContent"><p>Loading candidate information…</p></div>

<style>
  .candidate-header {
    display: flex;
    gap: 1.5rem;
    align-items: flex-start;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .candidate-photo {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
  }
  .candidate-photo-placeholder {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: #e5e7eb;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    color: #9ca3af;
    flex-shrink: 0;
  }
  .candidate-header-info h1 { margin: 0 0 0.4rem 0; }

  .party-badge {
    display: inline-block;
    padding: 0.2rem 0.65rem;
    border-radius: 12px;
    font-size: 0.82rem;
    font-weight: bold;
    margin-bottom: 0.6rem;
  }
  .party-R     { background: #fee2e2; color: #b91c1c; }
  .party-D     { background: #dbeafe; color: #1d4ed8; }
  .party-other { background: #f3f4f6; color: #374151; }

  .race-context {
    font-size: 0.9rem;
    color: #555;
    margin-bottom: 1rem;
  }

  .no-record-note {
    padding: 0.75rem 1rem;
    background: #f9f9f9;
    border-left: 3px solid #d1d5db;
    border-radius: 0 6px 6px 0;
    font-size: 0.88rem;
    color: #555;
    margin: 1.25rem 0;
  }

  .bio-section { margin: 1.25rem 0; line-height: 1.65; }

  .contact-section { margin: 1.25rem 0; }
  .contact-section h3 { font-size: 1rem; margin-bottom: 0.5rem; }
  .contact-section a  { display: block; margin-bottom: 0.4rem; font-size: 0.9rem; }

  .member-record-link {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.6rem 1rem;
    background: #eff6ff;
    border: 1px solid #bfdbfe;
    border-radius: 6px;
    font-size: 0.88rem;
    color: #1d4ed8;
    text-decoration: none;
    margin: 1rem 0 1.25rem 0;
  }
  .member-record-link:hover { background: #dbeafe; }

  .service-section {
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.5rem;
  }
  .service-section h3 { font-size: 1rem; margin: 0 0 0.75rem 0; color: #111; }
  .service-section dl {
    display: grid;
    grid-template-columns: 180px 1fr;
    gap: 0.5rem 1rem;
    margin: 0;
  }
  .service-section dt {
    font-size: 0.8rem;
    font-weight: bold;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding-top: 0.15rem;
  }
  .service-section dd { margin: 0; font-size: 0.95rem; color: #111; }
  @media (max-width: 500px) {
    .service-section dl { grid-template-columns: 1fr; }
    .service-section dt { margin-top: 0.5rem; }
  }

  .finance-section {
    margin: 1.5rem 0;
    border-top: 1px solid #e5e7eb;
    padding-top: 1.25rem;
  }
  .finance-section h3 { margin: 0 0 0.75rem 0; font-size: 1rem; }
  .finance-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 0.75rem;
    margin-bottom: 0.6rem;
  }
  .finance-card {
    border-radius: 6px;
    padding: 0.6rem 0.75rem;
  }
  .finance-card-label {
    font-size: 0.68rem;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 0.2rem;
  }
  .finance-card-value { font-size: 1.05rem; font-weight: bold; }
  .finance-card.raised  { background: #f0fdf4; border: 1px solid #bbf7d0; }
  .finance-card.raised  .finance-card-label { color: #166534; }
  .finance-card.raised  .finance-card-value { color: #15803d; }
  .finance-card.spent   { background: #fef2f2; border: 1px solid #fecaca; }
  .finance-card.spent   .finance-card-label { color: #991b1b; }
  .finance-card.spent   .finance-card-value { color: #b91c1c; }
  .finance-card.cash    { background: #eff6ff; border: 1px solid #bfdbfe; }
  .finance-card.cash    .finance-card-label { color: #1e40af; }
  .finance-card.cash    .finance-card-value { color: #1d4ed8; }
  .finance-meta { font-size: 0.78rem; color: #666; margin: 0; }

  .back-link { margin-top: 2rem; font-size: 0.9rem; }

  .role-badge {
    display: inline-block;
    padding: 0.2rem 0.6rem;
    border-radius: 10px;
    font-size: 0.75rem;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 0.6rem;
    margin-right: 0.3rem;
  }
  .role-incumbent  { background: #e0f2fe; color: #0369a1; }
  .role-withdrawn  { background: #fef2f2; color: #991b1b; }

  .profile-details {
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.5rem;
  }
  .profile-details dl {
    display: grid;
    grid-template-columns: 130px 1fr;
    gap: 0.5rem 1rem;
    margin: 0;
  }
  .profile-details dt {
    font-size: 0.8rem;
    font-weight: bold;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding-top: 0.15rem;
  }
  .profile-details dd { margin: 0; font-size: 0.95rem; color: #111; }

  @media (max-width: 500px) {
    .profile-details dl { grid-template-columns: 1fr; }
    .profile-details dt { margin-top: 0.5rem; }
  }
</style>

<script>
  const RACES_URL       = 'assets/data/races.json';
  const CONGRESS_URL    = 'assets/data/current-members.json';
  const GA_MEMBERS_URL  = 'assets/data/ga-members.json';

  const _params              = new URLSearchParams(window.location.search);
  const candidateId          = _params.get('id');
  const incumbentMemberId    = _params.get('memberId');
  const incumbentMemberSource = _params.get('memberSource') || 'congress';
  const incumbentRaceId      = _params.get('raceId');

  function getBasePath() {
    return window.location.pathname.includes('/votega.org-TEST/') ? '/votega.org-TEST/' : '/';
  }

  function partyClass(party) {
    if (!party) return 'party-other';
    const p = party.toLowerCase();
    if (p.includes('republican')) return 'party-R';
    if (p.includes('democrat'))   return 'party-D';
    return 'party-other';
  }

  function renderCandidate(candidate, race, phaseName) {
    const basePath   = getBasePath();
    const distLabel  = race.district ? ` District ${race.district}` : '';
    const raceLabel  = `${race.chamber}${distLabel} — ${race.cycle} ${phaseName === 'primary' ? 'Primary' : 'General Election'}`;
    const raceUrl    = `${basePath}race.html?id=${encodeURIComponent(race.id)}`;
    const isFederal  = race.level === 'federal';
    const isIncumbent = candidate.isIncumbent || candidate.type === 'incumbent';
    const isWithdrawn = !!candidate.withdrawn;

    // Link to member profile page when this candidate has a legislative record
    const existingMemberId = candidate.existingMemberId || '';
    const memberSource     = candidate.existingMemberSource || '';
    const memberUrl = existingMemberId
      ? memberSource === 'congress'
        ? `${basePath}member.html?bioguideId=${encodeURIComponent(existingMemberId)}`
        : `${basePath}ga-member.html?id=${encodeURIComponent(existingMemberId)}`
      : null;
    const memberRecordLabel = memberSource === 'congress' ? 'View Congressional record' : 'View legislative record';

    // Photo: use candidate image if available; fall back to bioguide photo for known members
    const photoSrc = candidate.imageUrl || (existingMemberId
      ? `https://bioguide.congress.gov/bioguide/photo/${existingMemberId[0]}/${existingMemberId}.jpg`
      : '');
    const photoHtml = photoSrc
      ? `<img class="candidate-photo" src="${photoSrc}" alt="${candidate.name}" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'candidate-photo-placeholder',textContent:'👤'}))">`
      : `<div class="candidate-photo-placeholder">👤</div>`;

    // Role and party badges
    const roleBadge = isWithdrawn
      ? `<span class="role-badge role-withdrawn">Withdrawn</span>`
      : isIncumbent
        ? `<span class="role-badge role-incumbent">Incumbent</span>`
        : '';

    // Detail fields
    const rows = [];
    if (candidate.occupation) rows.push(['Occupation', candidate.occupation]);
    if (candidate.county)     rows.push(['County', candidate.county]);
    if (candidate.party)      rows.push(['Party', candidate.party]);
    if (candidate.email)      rows.push(['Email', `<a href="mailto:${candidate.email}">${candidate.email}</a>`]);
    if (candidate.website)    rows.push(['Website', `<a href="${candidate.website}" target="_blank" rel="noopener">${candidate.website} ↗</a>`]);

    const detailsHtml = rows.length ? `
      <div class="profile-details">
        <dl>${rows.map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('')}</dl>
      </div>` : '';

    const bioHtml = candidate.bio
      ? `<div class="bio-section"><p>${candidate.bio}</p></div>` : '';

    // Link to legislative record when candidate has a member profile
    const memberRecordHtml = memberUrl
      ? `<a class="member-record-link" href="${memberUrl}">${memberRecordLabel} →</a>`
      : '';

    const serviceHtml = candidate.serviceHistory ? serviceHistoryHtml(candidate.serviceHistory) : '';

    // For federal candidates with no prior record (and not a known member), show a contextual note
    const noRecordHtml = isFederal && !candidate.bio && !memberUrl ? `
      <div class="no-record-note">
        This candidate has no prior U.S. Congressional record on file, or they are running for a different chamber.
      </div>` : '';

    document.title = `${candidate.name} — Candidate Profile`;

    document.getElementById('candidateContent').innerHTML = `
      <div class="candidate-header">
        ${photoHtml}
        <div class="candidate-header-info">
          <h1>${candidate.name}</h1>
          ${roleBadge}
          <span class="party-badge ${partyClass(candidate.party)}">${candidate.party || 'Unknown party'}</span>
          <div class="race-context">Running for: <a href="${raceUrl}">${raceLabel}</a></div>
        </div>
      </div>

      ${detailsHtml}
      ${memberRecordHtml}
      ${serviceHtml}
      ${noRecordHtml}
      ${bioHtml}
      <div id="campaignFinance" class="finance-section" style="display:none;"></div>

      <div class="back-link"><a href="${raceUrl}">← Back to ${race.chamber}${distLabel} race</a></div>`;
  }

  // Replace with your FEC API key from api.data.gov — DEMO_KEY is rate-limited to 30 req/hr
  const FEC_API_KEY = 'JBv4BxbJd3rgRV2X7dwjMMVCUhYtC42cqKEOZF6l';

  function fmtMoney(n) {
    if (n == null) return '—';
    if (Math.abs(n) >= 1_000_000) return '$' + (n / 1_000_000).toFixed(1) + 'M';
    if (Math.abs(n) >= 1_000)     return '$' + Math.round(n / 1_000) + 'K';
    return '$' + Math.round(n).toLocaleString();
  }

  async function loadCampaignFinance(candidate, race) {
    const container = document.getElementById('campaignFinance');
    if (!container) return;
    container.style.display = '';

    const level = race.level || '';
    const isFederal = level === 'federal';

    if (!isFederal) {
      // State candidates: link to Georgia Ethics Commission search
      const searchName = encodeURIComponent(candidate.name);
      container.innerHTML = `
        <h3>Campaign Finance</h3>
        <p style="font-size:0.875rem;color:#555;margin:0;">
          Georgia state campaign finance filings are managed by the
          <a href="https://media.ethics.ga.gov/search/Campaign/Campaign_ByName.aspx" target="_blank" rel="noopener">
            Georgia Government Transparency &amp; Campaign Finance Commission ↗
          </a>.
          Search for <strong>${candidate.name}</strong> to view their filings.
        </p>`;
      return;
    }

    // Federal: live FEC API lookup
    container.innerHTML = '<h3>Campaign Finance</h3><p style="color:#666;font-size:0.875rem;">Loading FEC data…</p>';

    try {
      // Strip quoted nicknames (e.g. Earl "Buddy" Carter → Earl Carter) before FEC search
      const fecName = candidate.name.replace(/["'][^"']*["']\s*/g, '').replace(/\s+/g, ' ').trim();
      const q = encodeURIComponent(fecName || candidate.name);
      const searchRes = await fetch(
        `https://api.open.fec.gov/v1/candidates/?q=${q}&state=GA&cycle=2026&sort=-receipts&api_key=${FEC_API_KEY}`
      );
      if (!searchRes.ok) throw new Error(`FEC ${searchRes.status}`);
      const searchData = await searchRes.json();
      const match = (searchData.results || [])[0];

      if (!match) {
        container.innerHTML = `
          <h3>Campaign Finance</h3>
          <p style="font-size:0.875rem;color:#666;">
            No FEC filing found for this candidate.
            <a href="https://www.fec.gov/data/candidates/?state=GA&election_year=2026" target="_blank" rel="noopener">Search FEC.gov ↗</a>
          </p>`;
        return;
      }

      // Prefer committee-level totals — cash on hand is reliably tracked there
      const committeeId = match.principal_committees?.[0]?.committee_id;
      const totalsUrl = committeeId
        ? `https://api.open.fec.gov/v1/committee/${committeeId}/totals/?cycle=2026&api_key=${FEC_API_KEY}`
        : `https://api.open.fec.gov/v1/candidate/${match.candidate_id}/totals/?cycle=2026&api_key=${FEC_API_KEY}`;

      const totalsRes = await fetch(totalsUrl);
      if (!totalsRes.ok) throw new Error(`FEC totals ${totalsRes.status}`);
      const totalsData = await totalsRes.json();
      const t = (totalsData.results || [])[0];

      const fecUrl = `https://www.fec.gov/data/candidate/${match.candidate_id}/`;
      const coverageNote = t?.coverage_end_date
        ? `2025–2026 election cycle · Through ${new Date(t.coverage_end_date).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'})}`
        : '2025–2026 election cycle';

      // Committee totals use last_cash_on_hand_end_period; candidate totals use cash_on_hand_end_period
      const cashOnHand = t?.last_cash_on_hand_end_period ?? t?.cash_on_hand_end_period;

      container.innerHTML = `
        <h3>Campaign Finance <small style="font-weight:normal;font-size:0.75rem;color:#777;">Source: FEC</small></h3>
        <div class="finance-cards">
          <div class="finance-card raised">
            <div class="finance-card-label">Total Raised</div>
            <div class="finance-card-value">${fmtMoney(t?.receipts)}</div>
          </div>
          <div class="finance-card spent">
            <div class="finance-card-label">Total Spent</div>
            <div class="finance-card-value">${fmtMoney(t?.disbursements)}</div>
          </div>
          <div class="finance-card cash">
            <div class="finance-card-label">Cash on Hand</div>
            <div class="finance-card-value">${fmtMoney(cashOnHand)}</div>
          </div>
        </div>
        <p class="finance-meta">${coverageNote}</p>
        <p class="finance-meta"><a href="${fecUrl}" target="_blank" rel="noopener">View full FEC filing ↗</a></p>`;

    } catch (err) {
      console.warn('FEC lookup failed:', err);
      container.innerHTML = `
        <h3>Campaign Finance</h3>
        <p style="font-size:0.875rem;color:#666;">
          Finance data unavailable.
          <a href="https://www.fec.gov/data/candidates/?state=GA&election_year=2026" target="_blank" rel="noopener">Search FEC.gov ↗</a>
        </p>`;
    }
  }

  function buildServiceHistory(member, memberSource) {
    const currentYear = new Date().getFullYear();

    if (memberSource === 'congress') {
      const raw = member.terms?.item;
      const termsArr = Array.isArray(raw) ? raw : (raw ? [raw] : []);
      if (!termsArr.length) return null;

      const sorted = [...termsArr].sort((a, b) => (a.startYear || 0) - (b.startYear || 0));
      const currentTerm = sorted[sorted.length - 1];
      const currentChamber = currentTerm.chamber || '';
      const currentSince   = currentTerm.startYear;

      // Consolidate prior stints by chamber (terms predating current chamber entry)
      const priorMap = {};
      for (const t of sorted.slice(0, -1)) {
        if (!t.chamber || t.chamber === currentChamber) continue;
        const ch = t.chamber;
        if (!priorMap[ch]) {
          priorMap[ch] = { startYear: t.startYear, endYear: t.endYear || null };
        } else {
          if (t.startYear < priorMap[ch].startYear) priorMap[ch].startYear = t.startYear;
          if (t.endYear && (!priorMap[ch].endYear || t.endYear > priorMap[ch].endYear)) priorMap[ch].endYear = t.endYear;
        }
      }
      const priorStints = Object.entries(priorMap).map(([chamber, r]) => ({ chamber, ...r }));
      const leadership  = (member.leadership || []).map(l => l.title).filter(Boolean);

      return { source: 'congress', currentChamber, currentSince, priorStints, leadership };
    }

    if (memberSource === 'state') {
      if (!member.termStartYear) return null;
      return {
        source: 'state',
        currentChamber: member.chamber || '',
        currentSince: member.termStartYear,
        priorStints: [],
        leadership: [],
      };
    }

    return null;
  }

  function serviceHistoryHtml(sh) {
    if (!sh) return '';
    const currentYear = new Date().getFullYear();

    const chamberLabel = ch => {
      if (!ch) return ch;
      if (sh.source === 'congress') {
        if (ch.includes('Senate')) return 'U.S. Senate';
        if (ch.includes('House'))  return 'U.S. House of Representatives';
      }
      return ch;
    };

    const yearsIn = since => {
      const n = currentYear - since;
      return n === 1 ? '1 year' : `${n} years`;
    };

    const rows = [];
    rows.push([chamberLabel(sh.currentChamber) || 'Current office',
               `Since ${sh.currentSince} (${yearsIn(sh.currentSince)})`]);

    for (const p of sh.priorStints) {
      const range = p.endYear ? `${p.startYear}–${p.endYear}` : `since ${p.startYear}`;
      rows.push([chamberLabel(p.chamber), range]);
    }

    if (sh.leadership.length) {
      rows.push(['Leadership', sh.leadership.join(', ')]);
    }

    return `
      <div class="service-section">
        <h3>Service History</h3>
        <dl>${rows.map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('')}</dl>
      </div>`;
  }

  async function initIncumbent(raceId, memberId, memberSource) {
    try {
      const membersUrl = memberSource === 'congress' ? CONGRESS_URL : GA_MEMBERS_URL;
      const [racesRes, membersRes] = await Promise.all([fetch(RACES_URL), fetch(membersUrl)]);
      if (!racesRes.ok) throw new Error(`HTTP ${racesRes.status}`);

      const racesData = await racesRes.json();
      const race = (racesData.races || []).find(r => r.id === raceId);
      if (!race) {
        document.getElementById('candidateContent').innerHTML =
          '<p>Race not found. <a href="elections.html">View all races</a></p>';
        return;
      }

      let member = null;
      if (membersRes.ok) {
        const membersData = await membersRes.json();
        const members = membersData.members || [];
        member = memberSource === 'congress'
          ? members.find(m => m.bioguideId === memberId)
          : members.find(m => m.id === memberId);
      }

      if (!member) {
        document.getElementById('candidateContent').innerHTML =
          '<p>Member not found. <a href="elections.html">View all races</a></p>';
        return;
      }

      // Build a candidate-like object from member data
      const name = memberSource === 'congress'
        ? [member.firstName, member.lastName].filter(Boolean).join(' ').trim() || member.name || ''
        : (member.name || '');
      const candidate = {
        name,
        party: member.partyName || member.party || '',
        imageUrl: member.depiction?.imageUrl || member.imageUrl || '',
        bio: '',
        website: '',
        isIncumbent: true,
        existingMemberId: memberId,
        existingMemberSource: memberSource,
        serviceHistory: buildServiceHistory(member, memberSource),
      };

      renderCandidate(candidate, race, race.activePhase);
      loadCampaignFinance(candidate, race);
    } catch (err) {
      console.error(err);
      document.getElementById('candidateContent').innerHTML =
        `<p>Error loading profile: ${err.message}. <a href="elections.html">Go back</a></p>`;
    }
  }

  async function init() {
    // Incumbent route: ?raceId=...&memberId=...
    if (incumbentMemberId && incumbentRaceId) {
      initIncumbent(incumbentRaceId, incumbentMemberId, incumbentMemberSource);
      return;
    }

    // Challenger route: ?id=...
    if (!candidateId) {
      document.getElementById('candidateContent').innerHTML =
        '<p>No candidate specified. <a href="elections.html">View all races</a></p>';
      return;
    }

    try {
      const res = await fetch(RACES_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const races = data.races || [];

      let found = null, foundRace = null, foundPhase = null;

      outer: for (const race of races) {
        for (const phaseName of ['primary', 'general']) {
          const phase = race.phases?.[phaseName];
          if (!phase) continue;

          let match = (phase.candidates || []).find(
            c => c.type === 'challenger' && c.id === candidateId
          );

          if (!match && phase.ballots) {
            for (const ballotCandidates of Object.values(phase.ballots)) {
              match = ballotCandidates.find(c => c.type === 'challenger' && c.id === candidateId);
              if (match) break;
            }
          }

          if (match) { found = match; foundRace = race; foundPhase = phaseName; break outer; }
        }
      }

      if (!found) {
        document.getElementById('candidateContent').innerHTML =
          '<p>Candidate not found. <a href="elections.html">View all races</a></p>';
        return;
      }

      // If challenger has prior congressional/state service, fetch member data for service history
      if (found.existingMemberId) {
        try {
          const membersUrl = found.existingMemberSource === 'state' ? GA_MEMBERS_URL : CONGRESS_URL;
          const membersRes = await fetch(membersUrl);
          if (membersRes.ok) {
            const membersData = await membersRes.json();
            const members = membersData.members || [];
            const member = found.existingMemberSource === 'state'
              ? members.find(m => m.id === found.existingMemberId)
              : members.find(m => m.bioguideId === found.existingMemberId);
            if (member) found.serviceHistory = buildServiceHistory(member, found.existingMemberSource || 'congress');
          }
        } catch (e) { /* non-fatal — render without service history */ }
      }

      renderCandidate(found, foundRace, foundPhase);
      loadCampaignFinance(found, foundRace);
    } catch (err) {
      console.error(err);
      document.getElementById('candidateContent').innerHTML =
        `<p>Error loading candidate: ${err.message}. <a href="elections.html">Go back</a></p>`;
    }
  }

  init();
</script>
