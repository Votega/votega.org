  function getBasePath() {
    return window.location.pathname.includes('/votega.org-TEST/') ? '/votega.org-TEST/' : '/';
  }

  function formatDate(iso) {
    if (!iso) return '';
    const [y, m, d] = iso.split('-').map(Number);
    return new Date(y, m - 1, d).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }

  function partyClass(party) {
    if (!party) return 'party-other';
    const p = party.toLowerCase();
    if (p.includes('republican')) return 'party-R';
    if (p.includes('democrat'))   return 'party-D';
    return 'party-other';
  }

  function candidateSummary(phase) {
    if (!phase) return 'No candidates listed yet';

    if (phase.ballots) {
      // Open primary — summarize each ballot's count
      const partyOrder = p => p.toLowerCase().includes('democrat') ? 0 : p.toLowerCase().includes('republican') ? 1 : 2;
      const parts = Object.entries(phase.ballots).sort((a, b) => partyOrder(a[0]) - partyOrder(b[0])).map(([party, candidates]) => {
        const count  = candidates.filter(c => !c.withdrawn).length;
        const abbrev = party.toLowerCase().includes('democrat')   ? 'D'
                     : party.toLowerCase().includes('republican') ? 'R'
                     : party[0].toUpperCase();
        return `${count} ${abbrev}`;
      });
      return parts.join(' · ') + (parts.length > 1 ? ' (open primary)' : '');
    }

    if (!phase.candidates || !phase.candidates.length) return 'No candidates listed yet';
    const names = phase.candidates
      .filter(c => !c.withdrawn)
      .map(c => c.type === 'incumbent' ? 'Incumbent' : c.name)
      .join(' · ');
    return names || 'No active candidates';
  }

  function racesForCounty(county) {
    const houseDists  = COUNTY_HOUSE_DISTRICTS[county]  || [];
    const senateDists = COUNTY_SENATE_DISTRICTS[county] || [];
    const usDists     = COUNTY_US_HOUSE_DISTRICTS[county] || [];

    if (county === '__all__')       return allRaces;
    if (county === '__statewide__') {
      return allRaces.filter(r => r.level === 'state-executive' || r.chamber === 'U.S. Senate');
    }

    return allRaces.filter(r => {
      if (r.level === 'state-executive') return true;
      if (r.chamber === 'Georgia House of Representatives') return houseDists.includes(r.district);
      if (r.chamber === 'Georgia State Senate')             return senateDists.includes(r.district);
      if (r.chamber === 'U.S. House')                      return usDists.includes(r.district);
      if (r.chamber === 'U.S. Senate')                     return true;
      return false;
    });
  }

  function renderRaceRow(race, basePath) {
    const phase      = race.phases[race.activePhase];
    const phaseLabel = race.activePhase === 'primary' ? 'Primary' : 'General';
    const phaseClass = race.activePhase === 'primary' ? 'phase-primary' : 'phase-general';
    const distLabel  = race.district ? ` — District ${race.district}` : '';
    const summary    = candidateSummary(phase);
    const dateStr    = phase ? formatDate(phase.electionDate) : '';
    return `
      <a class="race-row" href="${basePath}race.html?id=${encodeURIComponent(race.id)}">
        <div class="race-info">
          <div class="race-title">${race.chamber}${distLabel}</div>
          <div class="race-candidates">${summary}</div>
        </div>
        <div class="race-meta">
          <span class="phase-badge ${phaseClass}">${phaseLabel}</span>
          ${dateStr ? `<div class="race-date">${dateStr}</div>` : ''}
        </div>
        <span class="view-arrow">›</span>
      </a>`;
  }

  function renderRaces(county) {
    const races = racesForCounty(county);
    const basePath = getBasePath();

    if (!races.length) {
      racesOutput.innerHTML = '<p class="empty-note">No races on file yet for this county. Check back as 2026 candidate data is added.</p>';
      return;
    }

    let html = '';

    // State executive offices — always statewide, sorted by prescribed office order then district
    const execOfficeOrder = [
      'Governor', 'Lieutenant Governor', 'Secretary of State', 'Attorney General',
      'Commissioner of Agriculture', 'Insurance & Fire Safety Commissioner',
      'Labor Commissioner', 'State School Superintendent', 'Public Service Commissioner'
    ];
    const execRaces = races
      .filter(r => r.level === 'state-executive')
      .sort((a, b) => {
        const ai = execOfficeOrder.indexOf(a.chamber);
        const bi = execOfficeOrder.indexOf(b.chamber);
        const order = (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
        return order || (a.district ?? 0) - (b.district ?? 0);
      });
    if (execRaces.length) {
      html += `<div class="chamber-group"><h3>Georgia Statewide — Executive Offices</h3>`;
      execRaces.forEach(r => { html += renderRaceRow(r, basePath); });
      html += '</div>';
    }

    // State legislative and federal races grouped by chamber
    const chamberOrder = ['U.S. Senate', 'U.S. House', 'Georgia State Senate', 'Georgia House of Representatives'];
    const groups = {};
    races.filter(r => r.level !== 'state-executive').forEach(r => {
      if (!groups[r.chamber]) groups[r.chamber] = [];
      groups[r.chamber].push(r);
    });
    chamberOrder.forEach(chamber => {
      const group = groups[chamber];
      if (!group) return;
      html += `<div class="chamber-group"><h3>${chamber}</h3>`;
      group.sort((a, b) => (a.district ?? 0) - (b.district ?? 0))
           .forEach(r => { html += renderRaceRow(r, basePath); });
      html += '</div>';
      if (chamber === 'U.S. Senate') {
        html += `
                    <p class="box-note">Many counties are served by multiple districts, and some districts serve multiple counties. If you are unsure which district you're in, you can use the <a href="https://mvp.sos.ga.gov/s/mvp-landing-page" target="_blank">GA Secretary of State My Voter Page</a> tool. Enter your information and scroll to the bottom of the page to see your districts (both at the federal and state level). Then, you can identify which member and/or candidate is in your district.</p>`;
      }
    });

    racesOutput.innerHTML = html;
  }

  countySelect.addEventListener('change', () => {
    racesOutput.innerHTML = '';
    if (countySelect.value) renderRaces(countySelect.value);
  });

  async function loadData() {
    try {
      const res = await fetch(RACES_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      allRaces = (data.races || []).filter(r => r.cycle === 2026 && !r.id?.startsWith('_'));
    } catch (err) {
      statusEl.textContent = 'Could not load race data: ' + err.message;
    }
  }

  loadData();
</script>
