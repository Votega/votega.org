<h1>2026 Georgia Elections</h1>

<p>Select your county to see every candidate running for your state and federal seats in the 2026 election cycle — including incumbents' legislative records.</p>

<div class="tab-bar" id="tabBar">
  <button class="tab-btn active" data-tab="executive">Executive / Statewide</button>
  <button class="tab-btn" data-tab="us-senate">U.S. Senate</button>
  <button class="tab-btn" data-tab="us-house">U.S. House</button>
  <button class="tab-btn" data-tab="ga-senate">GA State Senate</button>
  <button class="tab-btn" data-tab="ga-house">GA State House</button>
  <button class="tab-btn" data-tab="courts">Courts</button>
</div>

<div class="county-filter" id="countyFilter">
  <label for="countySelect">Filter by county</label>
  <select id="countySelect">
    <option value="">— all districts —</option>
  </select>
</div>

<div class="msg" id="status"></div>
<div id="racesOutput"></div>

<script src="assets/scripts/ga-districts.js"></script>
<script>
  const RACES_URL = 'assets/data/races.json';

  const countySelect  = document.getElementById('countySelect');
  const countyFilter  = document.getElementById('countyFilter');
  const statusEl      = document.getElementById('status');
  const racesOutput   = document.getElementById('racesOutput');

  let allRaces  = [];
  let activeTab = 'executive';

  // Tabs that need the county dropdown
  const COUNTY_TABS = new Set(['us-house', 'ga-senate', 'ga-house']);

  const TAB_FILTER = {
    'executive': r => r.level === 'state-executive',
    'us-senate': r => r.chamber === 'U.S. Senate',
    'us-house':  r => r.chamber === 'U.S. House',
    'ga-senate': r => r.chamber === 'Georgia State Senate',
    'ga-house':  r => r.chamber === 'Georgia House of Representatives',
    'courts':    r => r.level === 'state-judicial',
  };

  // Populate county dropdown
  Object.keys(COUNTY_HOUSE_DISTRICTS).sort().forEach(county => {
    const opt = document.createElement('option');
    opt.value = county;
    opt.textContent = county;
    countySelect.appendChild(opt);
  });

  function getBasePath() {
    return window.location.pathname.includes('/votega.org-TEST/') ? '/votega.org-TEST/' : '/';
  }

  function formatDate(iso) {
    if (!iso) return '';
    const [y, m, d] = iso.split('-').map(Number);
    return new Date(y, m - 1, d).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }

  function candidateSummary(phase) {
    if (!phase) return 'No candidates listed yet';
    if (phase.ballots) {
      const partyOrder = p => p.toLowerCase().includes('democrat') ? 0 : p.toLowerCase().includes('republican') ? 1 : 2;
      const parts = Object.entries(phase.ballots).sort((a, b) => partyOrder(a[0]) - partyOrder(b[0])).map(([party, candidates]) => {
        const count  = candidates.filter(c => !c.withdrawn).length;
        const abbrev = party.toLowerCase().includes('democrat')   ? 'D'
                     : party.toLowerCase().includes('republican') ? 'R'
                     : party[0].toUpperCase();
        return `${count} ${abbrev}`;
      });
      return parts.join(' · ');
    }
    if (!phase.candidates || !phase.candidates.length) return 'No candidates listed yet';
    const names = phase.candidates.filter(c => !c.withdrawn)
      .map(c => c.type === 'incumbent' ? 'Incumbent' : c.name).join(' · ');
    return names || 'No active candidates';
  }

  function racesForTab(tab, county) {
    let races = allRaces.filter(TAB_FILTER[tab] || (() => false));

    // For district-based tabs, filter by county if one is selected
    if (COUNTY_TABS.has(tab) && county) {
      const houseDists  = COUNTY_HOUSE_DISTRICTS[county]  || [];
      const senateDists = COUNTY_SENATE_DISTRICTS[county] || [];
      const usDists     = COUNTY_US_HOUSE_DISTRICTS[county] || [];
      races = races.filter(r => {
        if (r.chamber === 'Georgia House of Representatives') return houseDists.includes(r.district);
        if (r.chamber === 'Georgia State Senate')             return senateDists.includes(r.district);
        if (r.chamber === 'U.S. House')                      return usDists.includes(r.district);
        return true;
      });
    }

    return races;
  }

  function renderRaceRow(race, basePath) {
    const phase      = race.phases[race.activePhase];
    const phaseLabel = race.activePhase === 'primary' ? 'Primary' : 'General';
    const phaseClass = race.activePhase === 'primary' ? 'phase-primary' : 'phase-general';
    const distLabel  = race.district ? ` — District ${race.district}` : '';
    const titleText  = race.displayTitle || `${race.chamber}${distLabel}`;
    const summary    = candidateSummary(phase);
    const dateStr    = phase ? formatDate(phase.electionDate) : '';
    return `
      <a class="race-row" href="${basePath}race.html?id=${encodeURIComponent(race.id)}">
        <div class="race-info">
          <div class="race-title">${titleText}</div>
          <div class="race-candidates">${summary}</div>
        </div>
        <div class="race-meta">
          <span class="phase-badge ${phaseClass}">${phaseLabel}</span>
          ${race._note ? `<span class="phase-badge phase-open-seat">Open Seat</span>` : ''}
          ${dateStr ? `<div class="race-date">${dateStr}</div>` : ''}
        </div>
        <span class="view-arrow">›</span>
      </a>`;
  }

  function renderRaces() {
    const county  = countySelect.value;
    const races   = racesForTab(activeTab, county);
    const basePath = getBasePath();

    if (!races.length) {
      const hint = COUNTY_TABS.has(activeTab) && !county
        ? 'Select a county above to filter by district, or all districts are shown when no county is selected.'
        : 'No races on file yet for this selection. Check back as 2026 candidate data is added.';
      racesOutput.innerHTML = `<p class="empty-note">${hint}</p>`;
      return;
    }

    let html = '';

    if (activeTab === 'courts') {
      const courtOrder = ['Supreme Court of Georgia', 'Georgia Court of Appeals', 'Superior Court'];
      const grouped = {};
      races.forEach(r => {
        if (!grouped[r.chamber]) grouped[r.chamber] = [];
        grouped[r.chamber].push(r);
      });
      courtOrder.forEach(chamber => {
        if (!grouped[chamber]) return;
        grouped[chamber].sort((a, b) => {
          if (a.circuit && b.circuit && a.circuit !== b.circuit) return a.circuit.localeCompare(b.circuit);
          return (a.seat || '').localeCompare(b.seat || '');
        }).forEach(r => { html += renderRaceRow(r, basePath); });
      });
    } else if (activeTab === 'executive') {
      const execOfficeOrder = [
        'Governor', 'Lieutenant Governor', 'Secretary of State', 'Attorney General',
        'Commissioner of Agriculture', 'Insurance & Fire Safety Commissioner',
        'Labor Commissioner', 'State School Superintendent', 'Public Service Commissioner'
      ];
      races.sort((a, b) => {
        const ai = execOfficeOrder.indexOf(a.chamber);
        const bi = execOfficeOrder.indexOf(b.chamber);
        return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi) || (a.district ?? 0) - (b.district ?? 0);
      }).forEach(r => { html += renderRaceRow(r, basePath); });
    } else {
      if (activeTab === 'us-senate' || COUNTY_TABS.has(activeTab)) {
        html += `<p class="box-note" style="margin-bottom:1rem;font-size:0.82rem;color:#555;">Many counties are served by multiple districts. If you are unsure which district you're in, use the <a href="https://mvp.sos.ga.gov/s/mvp-landing-page" target="_blank">GA Secretary of State My Voter Page</a> and scroll to the bottom to see your districts.</p>`;
      }

      races.sort((a, b) => (a.district ?? 0) - (b.district ?? 0))
           .forEach(r => { html += renderRaceRow(r, basePath); });
    }

    racesOutput.innerHTML = html;
  }

  // Tab click handler
  document.getElementById('tabBar').addEventListener('click', e => {
    const btn = e.target.closest('.tab-btn');
    if (!btn) return;
    activeTab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
    countyFilter.classList.toggle('visible', COUNTY_TABS.has(activeTab));
    countySelect.value = '';
    renderRaces();
  });

  countySelect.addEventListener('change', renderRaces);

  async function loadData() {
    try {
      const res = await fetch(RACES_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      allRaces = (data.races || []).filter(r => r.cycle === 2026 && !r.id?.startsWith('_'));
      renderRaces(); // render default tab on load
    } catch (err) {
      statusEl.textContent = 'Could not load race data: ' + err.message;
    }
  }

  loadData();
</script>
