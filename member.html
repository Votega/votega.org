---
layout: default
title: Legislative Member Details
permalink: /member.html
---

<h1>Legislative Member Details</h1>

<style>
  #pageLayout {
    display: flex;
    gap: 1.5rem;
    align-items: flex-start;
    margin-top: 2rem;
  }
  #memberDetails {
    flex: 1;
    min-width: 0;
    padding: 1rem;
    border: 1px solid #ccc;
    border-radius: 8px;
  }
  #stateSidebar {
    width: 240px;
    flex-shrink: 0;
    padding: 1rem;
    border: 1px solid #ccc;
    border-radius: 8px;
    position: sticky;
    top: 1rem;
    max-height: 80vh;
    overflow-y: auto;
    display: none;
  }
  #stateSidebar h3 {
    margin: 0 0 0.75rem 0;
    font-size: 0.95rem;
    border-bottom: 1px solid #ccc;
    padding-bottom: 0.5rem;
  }
  .sidebar-group-label {
    font-size: 0.75rem;
    font-weight: bold;
    text-transform: uppercase;
    color: #666;
    margin: 0.75rem 0 0.25rem 0;
  }
  .sidebar-member {
    display: block;
    padding: 0.3rem 0.4rem;
    border-radius: 4px;
    text-decoration: none;
    font-size: 0.875rem;
    color: inherit;
    line-height: 1.3;
  }
  .sidebar-member:hover {
    background: #f0f0f0;
  }
  .sidebar-member.current {
    background: #e8f0fe;
    font-weight: bold;
    cursor: default;
    pointer-events: none;
  }
  .sidebar-member-sub {
    font-size: 0.75rem;
    color: #666;
  }
  @media (max-width: 700px) {
    #pageLayout { flex-direction: column; }
    #stateSidebar { width: auto; position: static; max-height: 300px; display: block !important; }
  }

  .running-badge {
    padding: 0.6rem 1rem;
    border-radius: 0 6px 6px 0;
    border-left: 4px solid;
    margin-bottom: 1rem;
    font-size: 0.9rem;
    line-height: 1.5;
  }
  .running-badge.reelection {
    background: #f0fdf4;
    border-color: #16a34a;
    color: #14532d;
  }
  .running-badge.different-office {
    background: #faf5ff;
    border-color: #7c3aed;
    color: #4c1d95;
  }
  .running-badge strong { display: block; margin-bottom: 0.25rem; }
  .running-badge a { color: inherit; }
  #votingHistory {
    margin-top: 2rem;
    border-top: 1px solid #ddd;
    padding-top: 1.5rem;
  }
  #votingHistory h3 { margin: 0 0 0.5rem 0; }
  .vote-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.875rem;
  }
  .vote-table th, .vote-table td {
    text-align: left;
    padding: 0.4rem 0.6rem;
    border-bottom: 1px solid #eee;
  }
  .vote-table th { background: #f5f5f5; font-weight: bold; }
  .vote-yea   { color: #1a7a1a; font-weight: bold; }
  .vote-nay   { color: #b00020; font-weight: bold; }
  .vote-other { color: #666; }
</style>

<div id="pageLayout">
  <div id="memberDetails">
    <p>Loading member information...</p>
  </div>
  <div id="stateSidebar">
    <h3 id="sidebarTitle">State Delegation</h3>
    <div id="sidebarContent"></div>
  </div>
</div>

<div class="msg" id="status"></div>

<script>
  const DEBUG = false;

  const urlParams = new URLSearchParams(window.location.search);
  const bioguideId = urlParams.get('bioguideId');

  if (!bioguideId) {
    document.getElementById('memberDetails').innerHTML = '<p>No member selected. <a href="my-representatives.html">Go back</a></p>';
  } else {
    loadMemberDetails(bioguideId);
  }

  async function loadMemberDetails(bioguideId) {
    const DATA_URL = 'assets/data/current-members.json';
    const RACES_URL = 'assets/data/races.json';
    const statusLine = document.getElementById('status');
    statusLine.textContent = 'Loading member details…';

    try {
      const [membersRes, racesRes] = await Promise.all([
        fetch(DATA_URL),
        fetch(RACES_URL)
      ]);
      if (!membersRes.ok) throw new Error(`HTTP ${membersRes.status}`);

      const data = await membersRes.json();
      const allMembers = data.members || [];
      const member = allMembers.find(m => m.bioguideId === bioguideId) || {};

      if (!member.bioguideId) {
        throw new Error('Member not found in prebuilt data');
      }

      let electionInfo = null;
      if (racesRes.ok) {
        const racesData = await racesRes.json();
        electionInfo = findMemberInRaces(bioguideId, racesData.races || []);
      }

      if (DEBUG) {
        console.log('Member data:', member);
        console.log('Election info:', electionInfo);
      }

      displayMemberDetails(member, electionInfo);
      displaySidebar(member, allMembers);
      loadVotingHistory(member);
      statusLine.textContent = '';
    } catch (err) {
      console.error('loadMemberDetails()', err);
      const message = err.message.includes('HTTP') ?
        'Data file missing or inaccessible. Check that assets/data/current-members.json exists.' :
        err.message;
      statusLine.textContent = message;
      document.getElementById('memberDetails').innerHTML = '<p>Error loading details. <a href="my-representatives.html">Go back</a></p>';
    }
  }

  // Returns { type: 'reelection'|'different-office', race, challengerEntry } or null
  function findMemberInRaces(bioguideId, races) {
    for (const race of races) {
      for (const phaseName of ['primary', 'general']) {
        const phase = race.phases?.[phaseName];
        if (!phase) continue;

        const allCandidates = phase.ballots
          ? Object.values(phase.ballots).flat()
          : (phase.candidates || []);

        // Reelection: member is listed as incumbent in this race
        const asIncumbent = allCandidates.find(
          c => c.type === 'incumbent' && c.memberId === bioguideId && c.memberSource === 'congress'
        );
        if (asIncumbent) return { type: 'reelection', race, phase: phaseName };

        // Different office: member's bioguideId appears as existingMemberId on a challenger entry
        const asChallenger = allCandidates.find(
          c => c.type === 'challenger' && c.existingMemberId === bioguideId && c.existingMemberSource === 'congress'
        );
        if (asChallenger) return { type: 'different-office', race, phase: phaseName, challenger: asChallenger };
      }
    }
    return null;
  }

  function getBasePath() {
    const pathname = window.location.pathname;
    return pathname.includes('/votega.org-TEST/') ? '/votega.org-TEST/' : '/';
  }

  function getMemberName(m) {
    const honorific = m.honorificName || '';
    const first = m.firstName || '';
    const last = m.lastName || '';
    const fallback = m.directOrderName || m.name || 'Unknown';
    return (first && last) ? `${honorific} ${first} ${last}`.trim() : (honorific ? `${honorific} ${fallback}` : fallback);
  }

  function displaySidebar(currentMember, allMembers) {
    const state = currentMember.state || currentMember.stateName;
    if (!state) return;

    const statemates = allMembers.filter(m =>
      (m.state === state || m.stateName === state) && m.currentMember !== false
    );

    if (statemates.length <= 1) return;

    const senators = statemates
      .filter(m => {
        const terms = m.terms?.item || m.terms || [];
        return (Array.isArray(terms) ? terms : [terms]).some(t => t.chamber === 'Senate');
      })
      .sort((a, b) => getMemberName(a).localeCompare(getMemberName(b)));

    const reps = statemates
      .filter(m => {
        const terms = m.terms?.item || m.terms || [];
        return (Array.isArray(terms) ? terms : [terms]).some(t => t.chamber === 'House of Representatives');
      })
      .sort((a, b) => (a.district ?? 999) - (b.district ?? 999));

    const basePath = getBasePath();

    function renderGroup(members, label) {
      if (!members.length) return '';
      const items = members.map(m => {
        const name = getMemberName(m);
        const isCurrent = m.bioguideId === currentMember.bioguideId;
        const sub = m.district != null ? `District ${m.district} · ${m.partyName || ''}` : (m.partyName || '');
        if (isCurrent) {
          return `<span class="sidebar-member current">${name}<br><span class="sidebar-member-sub">${sub}</span></span>`;
        }
        return `<a class="sidebar-member" href="${basePath}member.html?bioguideId=${m.bioguideId}">${name}<br><span class="sidebar-member-sub">${sub}</span></a>`;
      }).join('');
      return `<div class="sidebar-group-label">${label}</div>${items}`;
    }

    document.getElementById('sidebarTitle').textContent = `${state} Delegation`;
    document.getElementById('sidebarContent').innerHTML =
      renderGroup(senators, 'Senate') + renderGroup(reps, 'House');
    document.getElementById('stateSidebar').style.display = 'block';
  }

  function buildVoteChart(yea, nay, other, total) {
    if (total === 0) return '';
    const pct = n => Math.round((n / total) * 100);

    // SVG pie chart — handle 100% single-slice edge case
    const size = 88, cx = 44, cy = 44, r = 40;
    const slices = [
      { value: yea,   color: '#16a34a' },
      { value: nay,   color: '#dc2626' },
      { value: other, color: '#9ca3af' },
    ].filter(s => s.value > 0);

    let svgPaths = '';
    if (slices.length === 1) {
      svgPaths = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${slices[0].color}"/>`;
    } else {
      let angle = -Math.PI / 2;
      for (const s of slices) {
        const sweep = (s.value / total) * 2 * Math.PI;
        const end   = angle + sweep;
        const x1 = (cx + r * Math.cos(angle)).toFixed(2);
        const y1 = (cy + r * Math.sin(angle)).toFixed(2);
        const x2 = (cx + r * Math.cos(end)).toFixed(2);
        const y2 = (cy + r * Math.sin(end)).toFixed(2);
        svgPaths += `<path d="M${cx},${cy}L${x1},${y1}A${r},${r} 0 ${sweep > Math.PI ? 1 : 0},1 ${x2},${y2}Z" fill="${s.color}"/>`;
        angle = end;
      }
    }

    const legendItems = [
      { label: 'Yea',   count: yea,   color: '#16a34a' },
      { label: 'Nay',   count: nay,   color: '#dc2626' },
      { label: 'Other', count: other, color: '#9ca3af' },
    ].filter(s => s.count > 0).map(s =>
      `<div style="display:flex;align-items:center;gap:0.5rem;font-size:0.85rem;">
        <span style="width:11px;height:11px;border-radius:50%;background:${s.color};flex-shrink:0;display:inline-block;"></span>
        <span>${s.label}: <strong>${s.count}</strong> <span style="color:#777;">(${pct(s.count)}%)</span></span>
      </div>`
    ).join('');

    const footnote = other > 0
      ? `<p style="font-size:0.72rem;color:#888;margin:0.5rem 0 0 0;">* Other includes Not Voting, Absent, and Excused</p>`
      : '';

    return `<div style="display:flex;align-items:center;gap:1.25rem;margin:0.75rem 0 1.25rem 0;">
      <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="flex-shrink:0;">${svgPaths}</svg>
      <div style="display:flex;flex-direction:column;gap:0.45rem;">${legendItems}${footnote}</div>
    </div>`;
  }

  async function loadVotingHistory(member) {
    const container = document.getElementById('votingHistory');
    if (!member.bioguideId || !container) return;

    const VOTES_URL = 'assets/data/federal-member-votes.json';
    try {
      const res = await fetch(VOTES_URL);
      if (!res.ok) return; // silently skip if file not yet generated

      const data        = await res.json();
      const memberVotes = (data.memberVotes || {})[member.bioguideId];
      if (!memberVotes || memberVotes.length === 0) {
        container.innerHTML = '<h3>Voting History</h3><p style="color:#666;font-size:0.875rem;">No votes recorded for this session.</p>';
        return;
      }

      const votesIndex = data.votes || {};
      const session    = data.metadata?.sessionName || '';

      // Determine member chamber to conditionally show Motion column
      const termsArr  = member.terms?.item || [];
      const latestTerm = (Array.isArray(termsArr) ? termsArr : [termsArr]).slice(-1)[0] || {};
      const isHouse   = (latestTerm.chamber || '').includes('House');

      // Sort most recent first
      const sorted = [...memberVotes].sort((a, b) => {
        const da = (votesIndex[a.voteId] || {}).date || '';
        const db = (votesIndex[b.voteId] || {}).date || '';
        return db.localeCompare(da);
      });

      const voteClass = v => v === 'Yea' ? 'vote-yea' : v === 'Nay' ? 'vote-nay' : 'vote-other';

      // Vote breakdown chart
      let yeaCount = 0, nayCount = 0, otherCount = 0;
      for (const { vote } of sorted) {
        if (vote === 'Yea') yeaCount++;
        else if (vote === 'Nay') nayCount++;
        else otherCount++;
      }
      const chartHtml = buildVoteChart(yeaCount, nayCount, otherCount, sorted.length);

      const rows = sorted.map(({ voteId, vote }) => {
        const meta     = votesIndex[voteId] || {};
        const bill     = meta.bill      || '—';
        const title    = meta.title     || '';
        const caption  = meta.motionText || '—';
        const date     = meta.date ? new Date(meta.date).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}) : '—';
        const billLink = meta.billUrl
          ? `<a href="${meta.billUrl}" target="_blank" rel="noopener">${bill}</a>`
          : bill;
        const billCell = title
          ? `${billLink}<br><span style="font-size:0.75rem;color:#555;font-weight:normal;">${title}</span>`
          : billLink;
        const motionCell = isHouse ? '' : `<td>${caption}</td>`;
        return `<tr>
          <td>${date}</td>
          <td>${billCell}</td>
          ${motionCell}
          <td class="${voteClass(vote)}">${vote}</td>
        </tr>`;
      }).join('');

      const motionHeader = isHouse ? '' : '<th>Motion</th>';
      container.innerHTML = `
        <h3>Voting History${session ? ` <small style="font-weight:normal;font-size:0.75rem;color:#666;">${session}</small>` : ''}</h3>
        <p style="font-size:0.8rem;color:#666;margin:0 0 0.75rem 0;">Showing votes on bills that were signed into law. Does not include votes on bills that failed, were vetoed, or are still pending.</p>
        ${chartHtml}
        <table class="vote-table">
          <thead><tr><th>Date</th><th>Bill</th>${motionHeader}<th>Vote</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    } catch (err) {
      console.warn('Could not load voting history:', err);
    }
  }

  function getPartyIconHtml(party) {
    if (!party) return '';
    const p = party.toLowerCase();
    const base = getBasePath();
    if (p.includes('democrat')) {
      return `<img width="22" alt="Donkey logo of the Democratic party." src="${base}assets/img/democratic-disc.svg" style="vertical-align:middle;">`;
    }
    if (p.includes('republican')) {
      return `<img width="22" alt="Elephant logo of the Republican Party." src="${base}assets/img/republican-disc.svg" style="vertical-align:middle;">`;
    }
    return '';
  }

  function displayMemberDetails(member, electionInfo) {
    const detailsDiv = document.getElementById('memberDetails');

    const honorific = member.honorificName || '';
    const firstName = member.firstName || '';
    const lastName = member.lastName || '';
    const fallbackName = member.directOrderName || member.name || 'Unknown';
    const fullName = (firstName && lastName)
      ? `${honorific} ${firstName} ${lastName}`.trim()
      : (honorific ? `${honorific} ${fallbackName}` : fallbackName);

    const party = member.partyName || (member.partyHistory && member.partyHistory.item ? member.partyHistory.item[0]?.partyName : 'N/A');
    const state = member.state || member.stateName || 'N/A';

    const currentTerm = member.terms?.item?.slice(-1)[0] || {};
    const chamber = currentTerm.chamber || 'N/A';
    const district = member.district ? `District ${member.district}` : (chamber === 'Senate' || chamber === 'House of Representatives' ? 'U.S. Senator' : 'N/A');

    const termsArr = member.terms?.item || [];
    const terms = Array.isArray(termsArr) ? termsArr : [termsArr];
    const startYears = terms.map(t => t.startYear).filter(y => typeof y === 'number');
    const startYear = startYears.length ? Math.max(...startYears) : 'N/A';
    const currentYear = new Date().getFullYear();
    const yearsInOffice = startYear ? (currentYear - startYear) : 'N/A';

    const imageUrl = member.depiction?.imageUrl;
    const imageHtml = imageUrl ? `<img src="${imageUrl}" alt="${fullName}" style="max-width: 200px; margin-bottom: 1rem; border-radius: 8px;">` : '';

    // Leadership positions
    const leadership = member.leadership || [];
    let leadershipHtml = '';
    if (leadership.length > 0) {
      const leadershipTitles = leadership.map(l => {
        const title = l.title || l.type || 'Unknown Position';
        const congress = l.congress ? ` (${l.congress}${l.current === true ? ', Current' : ''})` : '';
        return `${title}${congress}`;
      }).join(', ');
      leadershipHtml = `<p><strong>Leadership Position(s):</strong> ${leadershipTitles}</p>`;
    }

    // Committees
    const committees = member.committees || [];
    let committeesHtml = '';
    if (committees.length > 0) {
      const committeeItems = committees.map(c => `<li>${c}</li>`).join('');
      committeesHtml = `<p><strong>Committees:</strong></p><ul>${committeeItems}</ul>`;
    }

    // Contact information
    const contactInfo = member.contactInfo || {};
    let contactHtml = '';
    if (contactInfo.phoneNumber || contactInfo.officeAddress) {
      const phone = contactInfo.phoneNumber ? `<br>📞 ${contactInfo.phoneNumber}` : '';
      let addressStr = contactInfo.officeAddress || '';
      if (addressStr) {
        const zip = contactInfo.zipCode ? String(contactInfo.zipCode) : '';
        if (zip && !addressStr.includes(zip)) {
          const city = contactInfo.city || '';
          const region = contactInfo.district || '';
          addressStr = [addressStr, city, region, zip].filter(Boolean).join(', ').replace(/, (\d{5})$/, ' $1');
        }
      }
      const address = addressStr ? `<br>📍 ${addressStr}` : '';
      contactHtml = `<p><strong>Office Contact:</strong>${address}${phone}</p>`;
    }

    // Official website
    const websiteHtml = member.officialWebsiteUrl ?
      `<p><strong>Official Website:</strong> <a href="${member.officialWebsiteUrl}" target="_blank">${member.officialWebsiteUrl}</a></p>` : '';

    // Running for office badge
    let runningBadgeHtml = '';
    if (electionInfo) {
      const basePath = getBasePath();
      const race = electionInfo.race;
      const distLabel = race.district ? ` District ${race.district}` : '';
      const raceLabel = `${race.chamber}${distLabel}`;
      const raceUrl = `${basePath}race.html?id=${encodeURIComponent(race.id)}`;

      if (electionInfo.type === 'reelection') {
        runningBadgeHtml = `
          <div class="running-badge reelection">
            <strong>Running for Re-election</strong>
            This member is seeking re-election to their current seat.
            <a href="${raceUrl}">View ${raceLabel} race →</a>
          </div>`;
      } else if (electionInfo.type === 'different-office') {
        runningBadgeHtml = `
          <div class="running-badge different-office">
            <strong>Running for a Different Office</strong>
            This member is seeking election to <strong>${raceLabel}</strong>.
            <a href="${raceUrl}">View race →</a>
          </div>`;
      }
    }

    const html = `
      ${imageHtml}
      <h2>${fullName}</h2>
      ${runningBadgeHtml}
      ${member.birthYear ? `<p style="display:flex;justify-content:space-between;"><span><strong>Birth Year:</strong> ${member.birthYear}</span><span><strong>Age:</strong> ${currentYear - member.birthYear}</span></p>` : ''}
      <p style="display:flex;justify-content:space-between;"><span><strong>First Term (Current Chamber):</strong> ${startYear}</span><span><strong>Years in Office:</strong> ${yearsInOffice}</span></p>
      <p><strong>Party:</strong> ${party} ${getPartyIconHtml(party)}</p>
      <p><strong>State:</strong> ${state}</p>
      <p><strong>District:</strong> ${district}</p>
      <p><strong>Chamber:</strong> ${chamber}</p>
      ${leadershipHtml}
      ${committeesHtml}
      ${contactHtml}
      ${websiteHtml}

      <p><a href="my-representatives.html">Search for another member</a></p>
      <div id="votingHistory"></div>
    `;
    detailsDiv.innerHTML = html;
  }
</script>
