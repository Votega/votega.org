---
layout: default
title: Race Details
permalink: /race.html
---

<div id="raceContent"><p>Loading race information…</p></div>

<style>
  .race-header { margin-bottom: 1.5rem; }
  .race-header h1 { margin-bottom: 0.25rem; }
  .race-header .meta { font-size: 0.9rem; color: #555; }

  .phase-badge {
    display: inline-block;
    padding: 0.2rem 0.7rem;
    border-radius: 12px;
    font-size: 0.8rem;
    font-weight: bold;
    margin-right: 0.5rem;
  }
  .phase-primary { background: #fef9c3; color: #854d0e; }
  .phase-general { background: #dcfce7; color: #166534; }

  .primary-result-callout {
    padding: 0.75rem 1rem;
    background: #f0f4ff;
    border-left: 4px solid #4f6edb;
    border-radius: 0 6px 6px 0;
    margin-bottom: 1.5rem;
    font-size: 0.9rem;
  }
  .primary-result-callout strong { display: block; margin-bottom: 0.2rem; }

  .candidates-grid {
    display: flex;
    gap: 1.25rem;
    flex-wrap: wrap;
    margin-top: 1rem;
  }

  .candidate-card {
    flex: 1;
    min-width: 240px;
    max-width: 360px;
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 1.25rem;
    position: relative;
  }
  .candidate-card.incumbent { border-left: 4px solid #1a56a8; }
  .candidate-card.challenger { border-left: 4px solid #888; }
  .candidate-card.withdrawn     { opacity: 0.55; }
  .candidate-card.disqualified  { opacity: 0.55; }

  .role-badge {
    display: inline-block;
    padding: 0.15rem 0.55rem;
    border-radius: 10px;
    font-size: 0.72rem;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 0.6rem;
  }
  .role-incumbent  { background: #1a56a8; color: #fff; box-shadow: 0 1px 3px rgba(26,86,168,0.35); }
  .role-challenger { background: #f3f4f6; color: #374151; }
  .role-withdrawn      { background: #fef2f2; color: #991b1b; }
  .role-disqualified   { background: #fefce8; color: #854d0e; }

  .candidate-photo {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 0.75rem;
    display: block;
  }
  .candidate-photo-placeholder {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #e5e7eb;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    color: #9ca3af;
    margin-bottom: 0.75rem;
  }

  .candidate-name { font-size: 1.1rem; font-weight: bold; margin: 0 0 0.3rem 0; }

  .party-badge {
    display: inline-block;
    padding: 0.15rem 0.55rem;
    border-radius: 10px;
    font-size: 0.78rem;
    font-weight: bold;
    margin-bottom: 0.75rem;
  }
  .party-R    { background: #fee2e2; color: #b91c1c; }
  .party-D    { background: #dbeafe; color: #1d4ed8; }
  .party-other { background: #f3f4f6; color: #374151; }

  .candidate-bio { font-size: 0.88rem; color: #444; margin-bottom: 0.75rem; line-height: 1.5; }

  .candidate-links { display: flex; flex-direction: column; gap: 0.4rem; margin-top: 0.75rem; }
  .candidate-links a { font-size: 0.88rem; }

  .no-candidates {
    padding: 1rem;
    background: #f9f9f9;
    border-radius: 6px;
    border: 1px dashed #ccc;
    font-size: 0.9rem;
    color: #666;
  }

  /* Open primary ballot sections */
  .ballot-section { margin-bottom: 2rem; }
  .ballot-header {
    display: inline-block;
    padding: 0.3rem 0.8rem;
    border-radius: 4px;
    font-size: 0.8rem;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.75rem;
  }
  .ballot-D     { background: #dbeafe; color: #1d4ed8; }
  .ballot-R     { background: #fee2e2; color: #b91c1c; }
  .ballot-other { background: #f3f4f6; color: #374151; }
  .ballot-unopposed {
    font-size: 0.85rem;
    color: #666;
    font-style: italic;
    margin-top: 0.5rem;
  }

  .open-seat-banner {
    display: flex;
    align-items: flex-start;
    gap: 0.6rem;
    padding: 0.75rem 1rem;
    background: #fff7ed;
    border-left: 4px solid #ea580c;
    border-radius: 0 6px 6px 0;
    margin-bottom: 1.25rem;
    font-size: 0.9rem;
    color: #7c2d12;
    line-height: 1.5;
  }
  .open-seat-banner .open-seat-label {
    font-weight: bold;
    white-space: nowrap;
  }

  .back-link { margin-top: 2rem; font-size: 0.9rem; }

  @media (max-width: 600px) {
    .candidate-card { max-width: 100%; }
  }
</style>

<script>
  const RACES_URL       = 'assets/data/races.json';
  const GA_MEMBERS_URL  = 'assets/data/ga-members.json';
  const CONGRESS_URL    = 'assets/data/current-members.json';

  const raceId = new URLSearchParams(window.location.search).get('id');

  function getBasePath() {
    return window.location.pathname.includes('/votega.org-TEST/') ? '/votega.org-TEST/' : '/';
  }

  function formatDate(iso) {
    if (!iso) return '';
    const [y, m, d] = iso.split('-').map(Number);
    return new Date(y, m - 1, d).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }

  function partyClass(party) {
    if (!party) return 'party-other';
    const p = party.toLowerCase();
    if (p.includes('republican')) return 'party-R';
    if (p.includes('democrat'))   return 'party-D';
    return 'party-other';
  }

  function photoEl(url, name) {
    if (url) return `<img class="candidate-photo" src="${url}" alt="${name}">`;
    return `<div class="candidate-photo-placeholder">👤</div>`;
  }

  function renderIncumbentCard(candidate, member, race) {
    const basePath = getBasePath();
    const isState  = race.level === 'state';

    if (!member) {
      return `
        <div class="candidate-card incumbent">
          <span class="role-badge role-incumbent">&#9733; Current Officeholder</span>
          <p><em>Member data not found. Check that memberId matches the data file.</em></p>
        </div>`;
    }

    const name    = (member.firstName && member.lastName)
      ? `${member.firstName} ${member.lastName}`.trim()
      : (member.name || 'Unknown');
    const party   = member.party || member.partyName || '';
    const photo   = member.imageUrl || member.depiction?.imageUrl || '';
    const chamber = member.chamber || '';
    const district = member.district ?? '';

    const memberUrl = isState
      ? `${basePath}ga-member.html?id=${encodeURIComponent(member.id)}#votingHistory`
      : `${basePath}member.html?bioguideId=${encodeURIComponent(member.bioguideId)}#votingHistory`;

    const subtitle = [chamber, district ? `District ${district}` : ''].filter(Boolean).join(' · ');

    return `
      <div class="candidate-card incumbent">
        <span class="role-badge role-incumbent">&#9733; Current Officeholder</span>
        ${photoEl(photo, name)}
        <p class="candidate-name">${name}</p>
        <span class="party-badge ${partyClass(party)}">${party || 'Unknown party'}</span>
        ${subtitle ? `<p style="font-size:0.85rem;color:#555;margin:0 0 0.75rem 0;">${subtitle}</p>` : ''}
        ${candidate.bio ? `<p class="candidate-bio">${candidate.bio}</p>` : ''}
        <div class="candidate-links">
          <a href="${memberUrl}">View legislative record →</a>
          <a href="${basePath}candidate.html?raceId=${encodeURIComponent(race.id)}&memberId=${encodeURIComponent(candidate.memberId)}&memberSource=${encodeURIComponent(candidate.memberSource || 'congress')}">View candidate profile →</a>
        </div>
      </div>`;
  }

  function renderChallengerCard(candidate) {
    const basePath = getBasePath();
    if (candidate.disqualified) {
      return `
        <div class="candidate-card challenger disqualified">
          <span class="role-badge role-disqualified">Disqualified</span>
          <p class="candidate-name">${candidate.name}</p>
          <span class="party-badge ${partyClass(candidate.party)}">${candidate.party || ''}</span>
        </div>`;
    }
    if (candidate.withdrawn) {
      return `
        <div class="candidate-card challenger withdrawn">
          <span class="role-badge role-withdrawn">Withdrawn</span>
          <p class="candidate-name">${candidate.name}</p>
          <span class="party-badge ${partyClass(candidate.party)}">${candidate.party || ''}</span>
        </div>`;
    }

    const isIncumbent  = !!candidate.isIncumbent;
    const cardClass    = isIncumbent ? 'candidate-card incumbent' : 'candidate-card challenger';
    const badgeClass   = isIncumbent ? 'role-badge role-incumbent' : 'role-badge role-challenger';
    const badgeLabel   = isIncumbent ? '&#9733; Current Officeholder' : 'Candidate';

    const profileUrl = `${basePath}candidate.html?id=${encodeURIComponent(candidate.id)}`;
    const websiteHtml = candidate.website
      ? `<a href="${candidate.website}" target="_blank" rel="noopener">Campaign website ↗</a>`
      : '';

    return `
      <div class="${cardClass}">
        <span class="${badgeClass}">${badgeLabel}</span>
        ${photoEl(candidate.imageUrl, candidate.name)}
        <p class="candidate-name">${candidate.name}</p>
        <span class="party-badge ${partyClass(candidate.party)}">${candidate.party || 'Unknown party'}</span>
        ${candidate.bio ? `<p class="candidate-bio">${candidate.bio}</p>` : ''}
        <div class="candidate-links">
          ${websiteHtml}
          <a href="${profileUrl}">View candidate profile →</a>
        </div>
      </div>`;
  }

  function candidateLastName(c, members, race) {
    if (c.type === 'incumbent') {
      const m = race.level === 'federal'
        ? members.find(mb => mb.bioguideId === c.memberId)
        : members.find(mb => mb.id === c.memberId);
      return m?.lastName || (m?.name || '').split(' ').pop() || '';
    }
    return (c.name || '').split(' ').pop();
  }

  function renderBallotSection(partyName, candidates, members, race) {
    const active    = candidates.filter(c => !c.withdrawn && !c.disqualified)
                                .sort((a, b) => candidateLastName(a, members, race)
                                                  .localeCompare(candidateLastName(b, members, race)));
    const withdrawn = candidates.filter(c => c.withdrawn || c.disqualified);

    const ballotClass = partyName.toLowerCase().includes('democrat')   ? 'ballot-D'
                      : partyName.toLowerCase().includes('republican') ? 'ballot-R'
                      : 'ballot-other';

    const cardsHtml = [...active, ...withdrawn].map(c => {
      if (c.type === 'incumbent') {
        const member = race.level === 'federal'
          ? members.find(m => m.bioguideId === c.memberId)
          : members.find(m => m.id === c.memberId);
        return renderIncumbentCard(c, member, race);
      }
      return renderChallengerCard(c);
    }).join('');

    const emptyHtml    = !active.length && !withdrawn.length
      ? '<p class="no-candidates">No candidates listed yet for this ballot.</p>' : '';
    const unopposedHtml = active.length === 1
      ? '<p class="ballot-unopposed">Running unopposed in this primary</p>' : '';

    return `
      <div class="ballot-section">
        <span class="ballot-header ${ballotClass}">${partyName} Ballot</span>
        <div class="candidates-grid">${cardsHtml}</div>
        ${emptyHtml}${unopposedHtml}
      </div>`;
  }

  function renderRace(race, members) {
    const basePath   = getBasePath();
    const phase      = race.phases[race.activePhase];
    const phaseLabel = race.activePhase === 'primary' ? 'Primary' : 'General Election';
    const phaseClass = race.activePhase === 'primary' ? 'phase-primary' : 'phase-general';
    const distLabel  = race.district ? ` — District ${race.district}` : '';
    const raceTitle  = race.displayTitle || `${race.chamber}${distLabel}`;
    const dateStr    = phase ? formatDate(phase.electionDate) : '';

    // Open seat banner (shown when the previous officeholder is not running)
    const noteText = race._note ? race._note.replace(/^open seat\s*[—–-]+\s*/i, '') : '';
    const openSeatHtml = noteText
      ? `<div class="open-seat-banner">
           <span class="open-seat-label">Open Seat</span>
           <span>${noteText}</span>
         </div>`
      : '';

    // Primary result callout (shown after switching to general)
    const showResult = race.activePhase === 'general' && race.phases.primary?.primaryResult;
    const resultCallout = showResult
      ? `<div class="primary-result-callout">
           <strong>Primary Result</strong>
           ${race.phases.primary.primaryResult}
         </div>`
      : '';

    // Candidate cards — open primary (ballots) or flat list
    let candidatesHtml = '';
    if (phase?.ballots) {
      const partyOrder = p => p.toLowerCase().includes('democrat') ? 0 : p.toLowerCase().includes('republican') ? 1 : 2;
      candidatesHtml = Object.entries(phase.ballots)
        .sort((a, b) => partyOrder(a[0]) - partyOrder(b[0]))
        .map(([partyName, candidates]) => renderBallotSection(partyName, candidates, members, race))
        .join('');
    } else {
      const candidates = phase?.candidates || [];
      const active     = candidates.filter(c => !c.withdrawn && !c.disqualified);
      const withdrawn  = candidates.filter(c => c.withdrawn || c.disqualified);
      if (!active.length && !withdrawn.length) {
        candidatesHtml = '<p class="no-candidates">Candidate information not yet available for this phase.</p>';
      } else {
        candidatesHtml = `<div class="candidates-grid">` +
          [...active, ...withdrawn].map(c => {
            if (c.type === 'incumbent') {
              const member = race.level === 'federal'
                ? members.find(m => m.bioguideId === c.memberId)
                : members.find(m => m.id === c.memberId);
              return renderIncumbentCard(c, member, race);
            }
            return renderChallengerCard(c);
          }).join('') + `</div>`;
      }
    }

    document.title = `${raceTitle} — 2026 Elections`;

    document.getElementById('raceContent').innerHTML = `
      <div class="race-header">
        <h1>${raceTitle}</h1>
        <div class="meta">
          <span class="phase-badge ${phaseClass}">${phaseLabel}</span>
          ${dateStr ? `Election date: ${dateStr}` : ''}
          &nbsp;·&nbsp; ${race.cycle} Election Cycle
        </div>
      </div>
      ${openSeatHtml}
      ${resultCallout}
      ${candidatesHtml}
      <div class="back-link"><a href="${basePath}elections.html">← Back to Elections</a></div>`;

  }

  async function init() {
    if (!raceId) {
      document.getElementById('raceContent').innerHTML =
        '<p>No race specified. <a href="elections.html">View all races</a></p>';
      return;
    }

    try {
      const racesRes = await fetch(RACES_URL);
      if (!racesRes.ok) throw new Error(`HTTP ${racesRes.status}`);
      const racesData = await racesRes.json();
      const race = (racesData.races || []).find(r => r.id === raceId);

      if (!race) {
        document.getElementById('raceContent').innerHTML =
          '<p>Race not found. <a href="elections.html">View all races</a></p>';
        return;
      }

      // Load member data only if this race has incumbents in the active phase
      const phase = race.phases[race.activePhase];
      const allPhaseCandidates = phase?.ballots
        ? Object.values(phase.ballots).flat()
        : (phase?.candidates || []);
      const hasIncumbent = allPhaseCandidates.some(c => c.type === 'incumbent');

      let members = [];
      if (hasIncumbent) {
        const memberUrl = race.level === 'federal' ? CONGRESS_URL : GA_MEMBERS_URL;
        const mRes = await fetch(memberUrl);
        if (mRes.ok) {
          const mData = await mRes.json();
          members = mData.members || [];
        }
      }

      renderRace(race, members);
    } catch (err) {
      console.error(err);
      document.getElementById('raceContent').innerHTML =
        `<p>Error loading race: ${err.message}. <a href="elections.html">Go back</a></p>`;
    }
  }

  init();
</script>
