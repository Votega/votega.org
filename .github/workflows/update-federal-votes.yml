name: Update federal legislative vote data (GA delegation)

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    # Weekly on Sundays at 09:00 UTC
    - cron: '0 9 * * 0'

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Generate federal vote data
        run: python scripts/generate_federal_votes_data.py assets/data/federal-member-votes.json assets/data/current-members.json
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}

      - name: Validate generated data
        run: |
          if [ ! -f assets/data/federal-member-votes.json ]; then
            echo "Error: federal-member-votes.json was not generated"
            exit 1
          fi
          python -c "
          import json, os
          d = json.load(open('assets/data/federal-member-votes.json'))
          votes   = len(d.get('votes', {}))
          members = len(d.get('memberVotes', {}))
          size_kb = os.path.getsize('assets/data/federal-member-votes.json') // 1024
          print(f'Validated: {votes} roll calls, {members} GA members, {size_kb} KB')
          if votes == 0:
              print('Warning: No votes found — Congress.gov API may have no enacted bills yet or /law endpoint unavailable')
          "

      - name: Commit and push generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git rebase origin/main
          git add -f assets/data/federal-member-votes.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update federal legislative vote data (GA delegation)"
            git push
          fi
