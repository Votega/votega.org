name: Update Georgia General Assembly member data

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * *'  # daily at 07:00 UTC (one hour after Congress workflow)

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate GA member data
        run: python scripts/generate_ga_members_data.py assets/data/ga-members.json
        env:
          OPENSTATES_API_KEY: ${{ secrets.OPENSTATES_API_KEY }}

      - name: Validate generated data
        run: |
          if [ ! -f assets/data/ga-members.json ]; then
            echo "Error: ga-members.json was not generated"
            exit 1
          fi
          python -c "
          import json
          d = json.load(open('assets/data/ga-members.json'))
          count = d['metadata']['count']
          print(f'Validated: {count} GA members')
          assert count > 200, f'Expected 200+ members, got {count}'
          "

      - name: Commit and push generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked
          git fetch origin main
          git rebase origin/main
          git stash pop
          git add -f assets/data/ga-members.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Georgia General Assembly member data"
            git push
          fi

      - name: Publish to ga-legislators repo
        env:
          GA_LEGISLATORS_TOKEN: ${{ secrets.GA_LEGISLATORS_TOKEN }}
        run: |
          python3 - <<'EOF'
          import json, base64, urllib.request, urllib.error, os

          token = os.environ['GA_LEGISLATORS_TOKEN']
          repo  = 'Votega/ga-legislators'
          url   = f'https://api.github.com/repos/{repo}/contents/data/all.json'
          headers = {
              'Authorization': f'token {token}',
              'Accept': 'application/vnd.github.v3+json',
              'Content-Type': 'application/json',
          }

          with open('assets/data/ga-members.json', 'rb') as f:
              content = base64.b64encode(f.read()).decode()

          # Get current file SHA (required by GitHub API to update an existing file)
          sha = None
          req = urllib.request.Request(url, headers=headers)
          try:
              with urllib.request.urlopen(req) as resp:
                  sha = json.loads(resp.read())['sha']
          except urllib.error.HTTPError as e:
              if e.code != 404:
                  raise

          payload = {'message': 'Publish GA member data from votega.org', 'content': content}
          if sha:
              payload['sha'] = sha

          req = urllib.request.Request(url, data=json.dumps(payload).encode(), method='PUT', headers=headers)
          with urllib.request.urlopen(req) as resp:
              result = json.loads(resp.read())
              print(f"Published to ga-legislators: {result['commit']['sha']}")
          EOF
