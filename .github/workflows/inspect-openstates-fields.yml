name: Inspect Open States Fields (diagnostic)

on:
  workflow_dispatch:  # manual trigger only

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run field inspector
        env:
          OPENSTATES_API_KEY: ${{ secrets.OPENSTATES_API_KEY }}
        run: python scripts/inspect_openstates_fields.py
