name: Validate GA member overrides

on:
  push:
    paths:
      - 'assets/data/ga-members-overrides.json'
  pull_request:
    paths:
      - 'assets/data/ga-members-overrides.json'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate ga-members-overrides.json
        run: python scripts/validate_ga_overrides.py
